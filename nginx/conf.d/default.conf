# nginx/conf.d/default.conf
# ═══ Sergeev Agents — Nginx Reverse Proxy ═══
# Two domains: bot.sergeev-agents.ru → master-bot, n8n.sergeev-agents.ru → n8n

# ─── Rate limiting zones ───
limit_req_zone $binary_remote_addr zone=bot_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=n8n_limit:10m rate=10r/s;

# ─── Master Bot (bot.sergeev-agents.ru) ───
server {
    listen 443 ssl http2;
    server_name bot.sergeev-agents.ru;

    ssl_certificate /etc/letsencrypt/live/bot.sergeev-agents.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.sergeev-agents.ru/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Webhook endpoint (Telegram → master-bot)
    location /bot/ {
        limit_req zone=bot_limit burst=50 nodelay;

        proxy_pass http://master-bot:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Telegram sends small payloads, short timeout is fine
        proxy_read_timeout 10s;
        proxy_send_timeout 5s;
    }

    # Health & admin endpoints
    location /health {
        proxy_pass http://master-bot:3000;
    }

    location /admin/ {
        # TODO: Add IP whitelist or basic auth for production
        # allow 1.2.3.4;  # your IP
        # deny all;
        proxy_pass http://master-bot:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Block everything else
    location / {
        return 404;
    }
}

# ─── n8n (n8n.sergeev-agents.ru) ───
server {
    listen 443 ssl http2;
    server_name n8n.sergeev-agents.ru;

    ssl_certificate /etc/letsencrypt/live/n8n.sergeev-agents.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.sergeev-agents.ru/privkey.pem;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        limit_req zone=n8n_limit burst=20 nodelay;

        proxy_pass http://n8n:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (n8n uses it)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # n8n webhooks (for Dmitry and other workflows)
    location /webhook/ {
        limit_req zone=bot_limit burst=50 nodelay;

        proxy_pass http://n8n:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── HTTP → HTTPS redirect + Certbot ───
server {
    listen 80;
    server_name bot.sergeev-agents.ru n8n.sergeev-agents.ru;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
